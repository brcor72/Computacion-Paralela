version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: textile_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/masks:/app/masks
      - ./backend/textile_analysis.db:/app/textile_analysis.db
    environment:
      - OMP_NUM_THREADS=4
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: textile_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
